<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>順位管理システム</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>

</head>

<body>

<h1>🏆 順位管理システム（安定版）</h1>

<!-- ================= CSV ================= -->
<div class="box">
  <h2>📁 CSV取込</h2>

  <input type="file" id="csvFile" accept=".csv">
  <button id="csvLoadBtn">読み込み</button>
  <button id="csvSaveBtn">保存</button>
</div>

<!-- ================= 手動 ================= -->
<div class="box">
  <h2>✏️ 手動入力</h2>

  <input type="date" id="date">
  <button id="saveBtn">登録</button>

  <div id="table"></div>
</div>

<!-- ================= 一覧 ================= -->
<div class="box">
  <h2>📋 一覧（削除のみ）</h2>
  <div id="list"></div>
</div>

<!-- ================= 平均 ================= -->
<div class="box">
  <h2>📊 平均順位</h2>

  <input type="date" id="startAvg">
  <input type="date" id="endAvg">
  <button id="avgBtn">計算</button>

  <div id="avgResult"></div>
</div>

<!-- ================= グラフ ================= -->
<div class="box">
  <h2>📈 グラフ</h2>

  <input type="date" id="start">
  <input type="date" id="end">

  <button id="memberBtn">メンバー</button>
  <button id="graphBtn">表示</button>

  <div id="modal" class="modal hidden">
    <div class="modalContent">
      <label><input type="checkbox" id="selectAll"> 全員</label>
      <div id="playerList"></div>
      <button id="closeModal">閉じる</button>
    </div>
  </div>

  <canvas id="chart"></canvas>
</div>

</body>
</html>
