<body>

<h1>🏆 順位管理</h1>

<div class="container">

  <!-- CSV -->
  <div class="box">
    <h2>📂 CSV取込</h2>

    <input type="file" id="csvFile" hidden>

    <button class="main-btn" onclick="document.getElementById('csvFile').click()">
      📁 ファイル選択
    </button>

    <span id="fileName">未選択</span>

    <button class="sub-btn" onclick="importCSV()">⬆ 取込</button>
  </div>

  <!-- 手入力 -->
  <div class="box">
    <h2>✏️ 編集</h2>

    <div class="row">
      <input type="date" id="date">
      <button onclick="newEntry()">新規入力</button>
      <button class="main-btn" onclick="saveData()">登録</button>
    </div>

    <div id="table" class="table-input"></div>
  </div>

  <!-- 一覧 -->
  <div class="box">
    <h2>📋 一覧</h2>
    <div id="list" class="list"></div>
  </div>

  <!-- 平均 -->
  <div class="box">
    <h2>📊 平均順位</h2>

    <div class="row">
      <input type="date" id="startAvg">
      <input type="date" id="endAvg">
      <button class="main-btn" onclick="calcAvg()">計算</button>
    </div>

    <div id="avgResult"></div>
  </div>

  <!-- グラフ -->
  <div class="box">
    <h2>📈 グラフ</h2>

    <div class="row">
      <input type="date" id="start">
      <input type="date" id="end">
      <button id="memberBtn" class="sub-btn">メンバー選択</button>
      <button class="main-btn" onclick="drawChart()">表示</button>
    </div>

    <div id="modal" class="modal hidden">
      <div class="modalContent">
        <label><input type="checkbox" id="selectAll"> 全員</label>
        <div id="playerList"></div>
        <button id="closeModal">閉じる</button>
      </div>
    </div>

    <canvas id="chart"></canvas>
  </div>

</div>

</body>
