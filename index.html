<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ランキング管理</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
</head>
<body>

<div class="container">

<div class="header-bar">
  <h1 id="title">🏆ランキング管理</h1>
  <button onclick="toggleManage()" id="manageBtn">⚙️</button>
</div>

<!-- タブ -->
<div class="tabs">
  <button id="tab1" class="active" onclick="showPage(1)">全体記録</button>
  <button id="tab2" onclick="showPage(2)">ねこ海賊団</button>
</div>

<!-- ================= ページ1 ================= -->
<div id="page1">

<div id="manageArea" style="display:none; margin-bottom:10px;">
  <input type="file" id="csvFile">
  <div class="row">
    <button onclick="importCSV()">CSV取込</button>
    <button onclick="exportCSV()">CSV出力</button>
  </div>
</div>

<!-- 入力 -->
<div class="box">

  <div class="row">
    <select id="clan"></select>
  </div>

  <div class="row">
    <input id="score" type="number" placeholder="スコア">
  </div>

  <div class="row">
    <input id="date" type="date">
  </div>

  <div class="row">
    <button onclick="add()">追加</button>
  </div>

</div>

<!-- 曜日別 -->
<div class="box">
  <h3>🏆 曜日別最高スコア</h3>
  <div id="weekdayBest"></div>
</div>

<div class="box">
  <h3>📈 グラフ生成</h3>
  <div class="row">
    <input type="date" id="startDate">
    <input type="date" id="endDate">
  </div>
  <div class="row">
  <button onclick="openModal()">クラン選択</button>
  <span id="selectedClansText">未選択</span>
</div>
  <!-- モーダル -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3>クラン選択</h3>
    <div id="modalCheckboxes"></div>
    <div class="row">
      <button onclick="applySelection()">決定</button>
      <button onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>
  
  <div class="row">
  <select id="graphMode">
    <option value="score">スコア推移</option>
    <option value="rank">順位推移</option>
  </select>
</div>
  
  <div class="row">
    <button onclick="drawChart()">グラフ生成</button>
  </div>
  <canvas id="chart"></canvas>
</div>
  
<!-- 一覧 -->
<div class="box">
  <h3>📊 一覧</h3>
  <div id="tableWrap"></div>
</div>

</div>

<!-- ================= ページ2 ================= -->
<div id="page2" style="display:none">

<div class="box">
  <h3>🛠 開発中ページ</h3>
  <p>ここに新しい機能を追加していきます</p>
</div>

<div class="box">
  <h3>💡 予定</h3>
  <ul>
    <li>ランキング</li>
    <li>グラフ</li>
    <li>平均スコア</li>
  </ul>
</div>

</div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
