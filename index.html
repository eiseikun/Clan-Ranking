<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>順位管理</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🏆 順位管理（順位のみ）</h1>

<div class="box">
  <h2>CSV一括取込</h2>
  <input type="file" id="csvFile">
  <button onclick="importCSV()">取込</button>
</div>

<div class="box">
  <h2>✏️ 手動編集</h2>
  <input type="date" id="date">
  <button onclick="saveData()">登録</button>
  <table id="editTable"></table>
</div>

<div class="box">
  <h2>📅 一覧</h2>
  <div id="list" class="horizontal"></div>
</div>

<div class="box">
  <h2>📊 平均順位</h2>
  <input type="date" id="avgStart">
  <input type="date" id="avgEnd">
  <button onclick="calcAverage()">計算</button>
  <div id="avgResult"></div>
</div>

<div class="box">
  <h2>📈 グラフ</h2>
  <input type="date" id="start">
  <input type="date" id="end">
  <input id="players" placeholder="名前（カンマ区切り）">
  <button onclick="showGraph()">表示</button>
  <canvas id="chart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
